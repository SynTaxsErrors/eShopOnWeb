name: Container Workflow

on:
  workflow_dispatch:

env:
  acr_Li_ser: aistraining.azurecr.io
  tagname: eshoponweb026:1.0.0

jobs:
  build-container:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: ACR Login
        uses: docker/login-action@v4
        with:
          registry: ${{ env.acr_Li_ser }}
          username: ${{ secrets.ACR_USER }}
          password: ${{ secrets.ACR_PASS }}
      - name: Show repository files
        run: |
          pwd
          ls -R
      - name: Find Dockerfile
        run: |
         find . -name "Dockerfile"
          
      - name: Build and Push
        run: |
          docker build -t ${{ env.acr_Li_ser }}/${{ env.tagname }} ./src/Web/Dockerfile/
          docker push ${{ env.acr_Li_ser }}/${{ env.tagname }}
